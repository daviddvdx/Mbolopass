server:
  port: 8080

spring:
  application:
    name: mbolopass
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/mbolopass}
    username: ${SPRING_DATASOURCE_USERNAME:mbolopass}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jackson:
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:true}
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:CHANGE_ME_WITH_A_SECRET_OF_AT_LEAST_32_CHARACTERS}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
