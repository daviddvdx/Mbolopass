spring:
  datasource:
    url: "jdbc:h2:mem:mbolopass-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE"
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
app:
  jwt:
    secret: TEST_SECRET_WITH_AT_LEAST_32_CHARACTERS_FOR_JWT
    expiration-minutes: 120
  cors:
    allowed-origins: http://localhost:5173
  public-base-url: http://localhost:5173

